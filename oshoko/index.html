<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>お焼香ゲーム</title>
    <link rel="stylesheet" href="styles.css?v=20260525-oshoko09">
  </head>
  <body>
    <main class="game">
      <section class="title" id="title">
        <h1>お焼香ゲーム</h1>
        <p>箱の右側の灰を顔に近づけて、焼香箱の左側へ戻す動きを三回しよう。</p>
        <button id="startButton" type="button">スタート</button>
      </section>

      <section class="play" id="play" hidden>
        <header>
          <h1>お焼香を三回</h1>
          <button id="resetButton" type="button" aria-label="リセット">↺</button>
        </header>

        <section class="top-view" aria-label="上から見たお焼香">
          <div class="scene-stage" id="sceneStage">
            <img class="scene-base" src="assets/oshoko.png" alt="上から見たお焼香と顔">
            <div class="target-zone face-zone" aria-hidden="true"></div>
            <div class="target-zone return-zone" aria-hidden="true"></div>
            <img class="ash" id="ash" src="assets/ash.png" alt="灰">
          </div>
        </section>

        <section class="counter" aria-label="回数">
          <span id="count">0</span>/3
        </section>

        <section class="result" id="result" hidden>
          <h2>完了</h2>
          <p>三回のお焼香ができました。静かに心をこめて行います。</p>
        </section>
      </section>
    </main>
    <script src="app.js?v=20260525-oshoko09"></script>
  </body>
</html>
