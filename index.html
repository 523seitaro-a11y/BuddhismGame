<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BuddhismGame</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="topbar">
        <div>
          <p class="eyebrow">BuddhismGame</p>
          <h1>仏教体験ミニゲーム</h1>
        </div>
        <button class="icon-button" id="shareButton" type="button" aria-label="共有">
          <span aria-hidden="true">↗</span>
        </button>
      </section>

      <section class="progress" aria-label="進行状況">
        <div class="progress-track">
          <span id="progressBar"></span>
        </div>
        <p><span id="stageNumber">1</span>/4</p>
      </section>

      <section class="scene" id="scene">
        <div class="scene-art" id="sceneArt" aria-hidden="true">
          <span></span>
        </div>
        <div class="scene-copy">
          <p class="lesson" id="lessonLabel">呼吸を観る</p>
          <h2 id="stageTitle">一息だけ、静かに座る</h2>
          <p id="stageText">
            目の前のことを急いで変えようとせず、まず息が入って出ていくことに気づいてみます。
          </p>
        </div>
      </section>

      <section class="choices" id="choices" aria-label="選択肢"></section>

      <section class="insight" id="insight" hidden>
        <p id="insightText"></p>
        <button id="nextButton" type="button">次へ</button>
      </section>

      <section class="collection" aria-label="集めた学び">
        <p>集めた学び</p>
        <ul id="badgeList"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
