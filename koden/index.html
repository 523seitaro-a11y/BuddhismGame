<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>お香典選択ゲーム</title>
    <link rel="stylesheet" href="styles.css?v=20260523-games01">
  </head>
  <body>
    <main class="game">
      <section class="title" id="title">
        <h1>お香典選択ゲーム</h1>
        <p>三種類のお香典から、場面に合うものを一つ選ぼう。</p>
        <button id="startButton" type="button">スタート</button>
      </section>

      <section class="play" id="play" hidden>
        <header>
          <h1>お香典を選ぼう</h1>
          <button id="resetButton" type="button" aria-label="リセット">↺</button>
        </header>

        <section class="altar" aria-label="お寺の場面">
          <div class="table"></div>
          <div class="flower left"></div>
          <div class="flower right"></div>
          <div class="incense"></div>
        </section>

        <section class="choices" id="choices"></section>

        <section class="result" id="result" hidden>
          <h2 id="resultTitle"></h2>
          <p id="resultText"></p>
        </section>
      </section>
    </main>
    <script src="app.js?v=20260523-games01"></script>
  </body>
</html>
